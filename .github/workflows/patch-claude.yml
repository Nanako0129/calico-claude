name: Patch Claude Native

on:
  workflow_dispatch:
    inputs:
      native_version:
        description: "Optional native installer version (for example: 2.1.59). Leave empty for latest."
        required: false
        default: ""
      tag_name:
        description: "Optional release tag override. Use {version} and/or {platform}; if {platform} is omitted, -<platform> is appended."
        required: false
        default: ""
      force:
        description: "Force patch/release even if base platform release exists (uses suffix tags like vX-linux-x64-2)."
        required: false
        default: false
        type: boolean

jobs:
  patch-platform:
    name: Patch ${{ matrix.platform_label }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_label: linux-x64
            runs_on: ubuntu-latest
            release_suffix: linux-x64
            patched_asset_name: claude.native.patched
            needs_codesign: false
            can_execute: true
          - platform_label: linux-arm64
            runs_on: ubuntu-24.04-arm
            release_suffix: linux-arm64
            patched_asset_name: claude.native.patched
            needs_codesign: false
            can_execute: true
          - platform_label: macos-arm64
            runs_on: macos-26
            release_suffix: macos-arm64
            patched_asset_name: claude.native.macos.patched
            needs_codesign: true
            can_execute: true
          - platform_label: windows-x64
            runs_on: windows-latest
            release_suffix: win32-x64
            patched_asset_name: claude.native.windows.patched.exe
            needs_codesign: false
            can_execute: true
          - platform_label: windows-arm64
            runs_on: windows-11-arm
            release_suffix: win32-arm64
            patched_asset_name: claude.native.windows.patched.exe
            needs_codesign: false
            can_execute: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        id: tweakcc
        run: |
          set -euo pipefail
          npm install
          VERSION="$(node -e "console.log(require('./node_modules/tweakcc/package.json').version)")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download native binary
        id: native
        run: |
          set -euo pipefail

          VERSION_ARGS=()
          if [ -n "${{ github.event.inputs.native_version }}" ]; then
            VERSION_ARGS=(--version "${{ github.event.inputs.native_version }}")
          fi

          if [ "${#VERSION_ARGS[@]}" -gt 0 ]; then
            bash scripts/download-native-from-installer.sh \
              --platform "${{ matrix.release_suffix }}" \
              --output work/claude.native.original \
              --manifest-out work/manifest.json \
              "${VERSION_ARGS[@]}"
          else
            bash scripts/download-native-from-installer.sh \
              --platform "${{ matrix.release_suffix }}" \
              --output work/claude.native.original \
              --manifest-out work/manifest.json
          fi

      - name: Check if platform release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || '' }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.native.outputs.version }}"
          PLATFORM_SUFFIX="${{ matrix.release_suffix }}"
          BASE_TAG="v${VERSION}-${PLATFORM_SUFFIX}"

          if [ -n "$TAG_NAME_INPUT" ]; then
            BASE_TAG="${TAG_NAME_INPUT//\{version\}/$VERSION}"

            if [[ "$BASE_TAG" == *"{platform}"* ]]; then
              BASE_TAG="${BASE_TAG//\{platform\}/$PLATFORM_SUFFIX}"
            elif [[ "$BASE_TAG" != *"-$PLATFORM_SUFFIX" ]]; then
              BASE_TAG="${BASE_TAG}-$PLATFORM_SUFFIX"
            fi
          fi

          TAG="$BASE_TAG"
          TITLE="claude-code native ${VERSION} (${PLATFORM_SUFFIX})"

          if gh release view "$BASE_TAG" > /dev/null 2>&1; then
            if [ "$FORCE_RELEASE" = "true" ]; then
              SUFFIX=2
              TAG="${BASE_TAG}-${SUFFIX}"
              while gh release view "$TAG" > /dev/null 2>&1; do
                SUFFIX=$((SUFFIX + 1))
                TAG="${BASE_TAG}-${SUFFIX}"
              done

              echo "Release ${BASE_TAG} exists; forcing with tag ${TAG}."
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "title=$TITLE (${TAG})" >> "$GITHUB_OUTPUT"
            else
              echo "Release ${BASE_TAG} already exists, skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply display patches to native binaries (tweakcc)
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail

          PATCHED_PATH="work/${{ matrix.patched_asset_name }}"
          NEEDS_CODESIGN="${{ matrix.needs_codesign }}"
          CAN_EXECUTE="${{ matrix.can_execute }}"

          node scripts/patch-native-with-tweakcc.ts \
            --input work/claude.native.original \
            --output "$PATCHED_PATH"
          chmod +x "$PATCHED_PATH"

          if [ "$NEEDS_CODESIGN" = "true" ]; then
            codesign -f -s - "$PATCHED_PATH"
          fi

          if [ "$CAN_EXECUTE" = "true" ]; then
            "$PATCHED_PATH" --version | tee work/version.txt
            grep -F "(patched)" work/version.txt
          else
            echo "Skipping runtime check for non-native runner architecture."
            node -e "import('tweakcc').then(async (t) => { const content = await t.readContent({ path: process.argv[1], kind: 'native' }); if (!content.includes('}.VERSION} (Claude Code)\\\\n(patched)')) { console.error('Patched version marker not found in extracted bundle'); process.exit(1); } })" "$PATCHED_PATH"
          fi

      - name: Write metadata
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          {
            echo "platform=${{ matrix.release_suffix }}"
            echo "native_install_script=https://claude.ai/install.sh"
            echo "native_version=${{ steps.native.outputs.version }}"
            echo "native_binary_path=${{ steps.native.outputs.path }}"
            echo "tweakcc_version=${{ steps.tweakcc.outputs.version }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
          } > work/metadata.txt

      - name: Create platform release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.native.outputs.version }}"
          TAG="${{ steps.check.outputs.tag }}"
          TITLE="${{ steps.check.outputs.title }}"
          PATCHED_PATH="work/${{ matrix.patched_asset_name }}"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Patched native Claude ${{ matrix.platform_label }} build via tweakcc API (version: ${{ steps.tweakcc.outputs.version }}), source version \`${VERSION}\`" \
            work/metadata.txt \
            "$PATCHED_PATH"
